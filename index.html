      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+46762498486",
        "contactType": "customer service",
        "availableLanguage": ["Swedish", "English", "Polish"],

      "sameAs": [

        "https://www.linkedin.com/company/stayonsite"
